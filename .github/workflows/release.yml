name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf junebug-${{ github.ref_name }}-${{ matrix.target }}.tar.gz junebug
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/junebug.exe -DestinationPath junebug-${{ github.ref_name }}-${{ matrix.target }}.zip
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            junebug-*.tar.gz
            junebug-*.zip
